# Meteor Worker 配置 — 单节点集成测试
include "meteor-shared.conf"

pekko {
  actor {
    provider = "cluster"
    serialization-bindings {
      "cn.xuyinyin.meteor.common.MasterActorCommand" = java
      "cn.xuyinyin.meteor.common.WorkerActorCommand" = java
      "cn.xuyinyin.meteor.common.Protocol" = jackson-json
    }
    serializers {
      jackson-json = "org.apache.pekko.serialization.jackson.JacksonJsonSerializer"
    }
  }

  remote.artery {
    canonical {
      hostname = "127.0.0.1"
      port = 2561
    }
  }

  cluster {
    seed-nodes = [
      "pekko://meteor-shuffle@127.0.0.1:2551"
    ]
    roles = ["worker"]
    configuration-compatibility-check.enforce-on-join = off
  }
}

meteor {
  role = "worker"

  worker {
    bind-port = 2561
    rpc-port = 2562
    data-port = 9000
    storage.dirs = ["/tmp/meteor/shuffle1", "/tmp/meteor/shuffle2"]
    flusher.threads = 8
    flusher.buffer-size = 256k

    replica {
      enabled = true
      timeout = 10s
      retries = 3
    }
  }
}

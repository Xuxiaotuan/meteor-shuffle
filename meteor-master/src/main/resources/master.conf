# Meteor Master 配置 — 支持单节点和 3 节点 HA
include "meteor-shared.conf"

pekko {
  actor {
    provider = "cluster"
    serialization-bindings {
      "cn.xuyinyin.meteor.common.MasterActorCommand" = java
      "cn.xuyinyin.meteor.common.WorkerActorCommand" = java
      "cn.xuyinyin.meteor.common.Protocol" = jackson-json
    }
  }

  remote.artery {
    canonical {
      hostname = ${?PEKKO_HOST}
      hostname = "127.0.0.1"
      port = ${?PEKKO_PORT}
      port = 2551
    }
  }

  cluster {
    # 3 节点 seed-nodes：当启动第 2、3 个节点时自动发现
    seed-nodes = [
      "pekko://meteor-shuffle@127.0.0.1:2551",
      "pekko://meteor-shuffle@127.0.0.1:2552",
      "pekko://meteor-shuffle@127.0.0.1:2553"
    ]
    roles = ["master"]
    configuration-compatibility-check.enforce-on-join = off
    auto-down-unreachable-after = 10s

    # 集群最小节点数（3 节点 HA 需要至少 2 个节点存活）
    min-nr-of-members = ${?METR_MIN_MEMBERS}
    min-nr-of-members = 1
  }

  # Persistence：生产环境用 LevelDB，测试用 inmem
  persistence {
    journal.plugin = "pekko.persistence.journal.leveldb"
    snapshot-store.plugin = "pekko.persistence.snapshot-store.local"

    journal.leveldb {
      class = "org.apache.pekko.persistence.journal.leveldb.LeveldbJournal"
      dir = ${?METR_JOURNAL_DIR}
      dir = "target/master-journal"
    }
    snapshot-store.local.dir = ${?METR_SNAPSHOT_DIR}
    snapshot-store.local.dir = "target/master-snapshots"

    # inmem fallback（测试用）
    journal.inmem {
      class = "org.apache.pekko.persistence.journal.inmem.InmemJournal"
    }
  }
}

meteor {
  role = "master"

  master {
    endpoints = ["127.0.0.1:2551", "127.0.0.1:2552", "127.0.0.1:2553"]
    slot-assign-policy = "round-robin"
  }
}
